<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Program Knowledge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .card {
            background: transparent;
            width: 90%;
            max-width: 1000px; 
            text-align: center;
            transform-style: preserve-3d;
        }

        #c-knowledge-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-item {
            text-align: left;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 22px;
            color: var(--purple-text) !important;
            transition: transform 0.4s ease, background 0.3s;
            transform-style: preserve-3d;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .name { font-weight: 700; font-size: 1.2rem; margin-bottom: 8px; display: block; }
        .desc { color: rgba(255, 255, 255, 0.8); font-size: 0.9rem; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <div style="text-align: left;">
            <a href="index.html" style="color: var(--purple-text); text-decoration: none; font-weight: 600;">← 返回主页</a>
        </div>
        
        <h1 style="color: white;">C Programming</h1>
        <div id="greeting" style="color: white !important;">📚 核心知识点库</div>
        
        <div id="c-knowledge-container"></div>
    </div>

    <script>
        async function loadCData() {
            const container = document.getElementById('c-knowledge-container');
            try {
                const response = await fetch('c-data.json');
                const data = await response.json();
                
                container.innerHTML = "";
                
                data.forEach(item => {
                    const link = document.createElement('a');
                    link.href = item.url;
                    link.className = "nav-item";
                    link.target = "_blank";
                    link.innerHTML = `
                        <div class="nav-info">
                            <span class="name">${item.icon || ''} ${item.name}</span>
                            <div class="desc">${item.desc}</div>
                        </div>
                    `;

                    link.addEventListener('mousemove', (e) => {
                        const rect = link.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        const rotateX = ((y - rect.height / 2) / rect.height) * -10;
                        const rotateY = ((x - rect.width / 2) / rect.width) * 10;
                        link.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(20px)`;
                    });

                    link.addEventListener('mouseleave', () => {
                        link.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px)`;
                    });

                    container.appendChild(link);
                });
            } catch (err) {
                console.error("加载 C 语言数据失败:", err);
                container.innerHTML = "<p style='color:white;'>数据加载失败，请检查 c-data.json 是否存在。</p>";
            }
        }

        document.addEventListener('DOMContentLoaded', loadCData);
    </script>
</body>
</html>
