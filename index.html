<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NicoleR6的个人主页</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        body {
            background: url('https://source.unsplash.com/random/1920x1080?landscape,dark') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-color);
            transition: all 0.5s;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box { margin-bottom: 25px; }

        #search-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            width: 100%;
            box-sizing: border-box;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        #search-input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #007bff;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.3);
        }

        body.dark-mode {
            background-color: #1a1a1a;
            color: #ecf0f1;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        body.dark-mode .card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.dark-mode h1 {
            color: #ecf0f1;
        }

        body.dark-mode .nav-item {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        body.dark-mode #search-input {
            background: #333;
            border-color: #444;
            color: white;
        }

        .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .card {
            animation: fadeInUp 0.8s ease-out forwards;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 350px;
            text-align: center;
        }

        #nav-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0; 
            animation: fadeInUp 0.5s ease-out forwards;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .nav-item:nth-child(1) { animation-delay: 0.2s; }
        .nav-item:nth-child(2) { animation-delay: 0.3s; }
        .nav-item:nth-child(3) { animation-delay: 0.4s; }
        .nav-item:nth-child(4) { animation-delay: 0.5s; }

        .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .name {
            font-size: 0.9rem;
            font-weight: 400;
        }

        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        #greeting {
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 25px;
            color: white !important;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">收藏夹</h1>
        <p id="greeting" style="color: #666; font-size: 0.9rem;"></p>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="输入并回车搜索 Google..." />
        </div>

        <div id="nav-links"></div>
    </div>

    <script>
        const hour = new Date().getHours();
        const greetingElement = document.getElementById('greeting');
        let greetingText = "";

        if (hour >= 18 || hour < 6) {
            document.body.classList.add('dark-mode');
            greetingText = "🌙 晚上好！该整理今天的收获了";
        } else {
            greetingText = hour < 12 ? "☀️ 早上好！" : "☕ 下午好！";
        }

        greetingElement.innerText = greetingText;
        
        async function init() {
            const hour = new Date().getHours();
            const greetingElement = document.getElementById('greeting');
            if (hour >= 18 || hour < 6) {
                document.body.classList.add('dark-mode');
                greetingElement.innerText = "🌙 晚上好！该整理今天的收获了";
            } else {
                greetingElement.innerText = hour < 12 ? "☀️ 早上好！" : "☕ 下午好！";
            }

            try {
                const response = await fetch('data.json');
                const mySites = await response.json();
                
                const container = document.getElementById('nav-links');
                
                mySites.forEach(site => {
                    const link = document.createElement('a');
                    link.href = site.url;
                    link.className = "nav-item";
                    link.target = "_blank";
                    link.innerHTML = `
                        <span class="icon">${site.icon || '🔗'}</span>
                        <span class="name">${site.name}</span>
                    `;
                    container.appendChild(link);
                });
            } catch (err) {
                console.error("加载数据失败:", err);
            }

            const searchInput = document.getElementById('search-input');

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = searchInput.value;
                    if (query) {
                        window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
