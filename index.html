<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NicoleR6的个人主页</title>
    <style>
        /* 这是 CSS：负责外观 */
        body { 
            background-color: #f0f2f5; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .card { 
            background: white; 
            padding: 2rem; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center;
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>我的导航收藏夹</h1>
        <div id="nav-links" style="display: grid; gap: 10px; margin-top: 20px;"></div>
    </div>

    <script>
        const mySites = [
            { name: "GitHub", url: "https://github.com" },
            { name: "Bilibili", url: "https://bilibili.com" },
            { name: "MDN 文档", url: "https://developer.mozilla.org" }
        ];

        const container = document.getElementById('nav-links');

        mySites.forEach(site => {
            const link = document.createElement('a');
            link.href = site.url;
            link.innerText = site.name;
            link.target = "_blank";

            link.style.padding = "10px";
            link.style.background = "#eee";
            link.style.borderRadius = "8px";
            link.style.textDecoration = "none";
            link.style.color = "#333";

            container.appendChild(link);
        });
    </script>
</body>
</html>
