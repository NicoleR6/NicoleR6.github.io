<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NicoleR6的个人主页</title>
    <style>
        body { 
            background-color: #f0f2f5; 
            color: #333;
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            transition: all 0.5s;
        }

        body.dark-mode {
            background-color: #1a1a1a;
            color: #ecf0f1;
        }

        body.dark-mode .card {
            background: #2d2d2d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: #ecf0f1;
        }

        body.dark-mode h1 {
            color: #ecf0f1;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 350px;
            text-align: center;
        }

        #nav-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            border: 1px solid #ddd;
            border-radius: 16px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 20px rgba(0, 123, 255, 0.15);
            border-color: #007bff;
            background: white;
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">收藏夹</h1>
        <p id="greeting" style="color: #666; font-size: 0.9rem;"></p>
    </div>

    <script>
        const hour = new Date().getHours();
        const greetingElement = document.getElementById('greeting');
        let greetingText = "";

        if (hour >= 18 || hour < 6) {
            document.body.classList.add('dark-mode');
            greetingText = "🌙 晚上好！该整理今天的收获了";
        } else {
            greetingText = hour < 12 ? "☀️ 早上好！" : "☕ 下午好！";
        }
        
        greetingElement.innerText = greetingText;
        
        const mySites = [
            { name: "GitHub", url: "https://github.com", icon: "🐙" },
            { name: "Bilibili", url: "https://bilibili.com", icon: "📺" },
            { name: "MDN 文档", url: "https://developer.mozilla.org", icon: "📚" },
            { name: "Github", url: "https://github.com/NicoleR6", icon: ""},
        ];

        const container = document.getElementById('nav-links');

        mySites.forEach(site => {
            const link = document.createElement('a');
            link.href = site.url;
            link.className = "nav-item";
            link.target = "_blank";

            link.innerHTML = `
                <span class="icon">${site.icon}</span>
                <span class="name">${site.name}</span>
            `;

            container.appendChild(link);
        });
    </script>
</body>
</html>
