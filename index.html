<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NicoleR6的个人主页</title>
    <style>
        body { 
            background-color: #f0f2f5; 
            color: #333;
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            transition: all 0.5s;
        }

        .search-box {
            margin: 20px 0;
        }

        #search-input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #eee;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            font-size: 1rem;
        }

        #search-input:focus {
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.1);
        }

        body.dark-mode {
            background-color: #1a1a1a;
            color: #ecf0f1;
        }

        body.dark-mode .card {
            background: #2d2d2d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: #ecf0f1;
        }

        body.dark-mode h1 {
            color: #ecf0f1;
        }

        body.dark-mode .nav-item {
            background: linear-gradient(145deg, #333, #222);
            border-color: #444;
            color: #ecf0f1;
        }

        body.dark-mode #search-input {
            background: #333;
            border-color: #444;
            color: white;
        }

        .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 350px;
            text-align: center;
        }

        #nav-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            border: 1px solid #ddd;
            border-radius: 16px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 20px rgba(0, 123, 255, 0.15);
            border-color: #007bff;
            background: white;
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">收藏夹</h1>
        <p id="greeting" style="color: #666; font-size: 0.9rem;"></p>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="输入并回车搜索 Google..." />
        </div>

        <div id="nav-links"></div>
    </div>

    <script>
        const hour = new Date().getHours();
        const greetingElement = document.getElementById('greeting');
        let greetingText = "";

        if (hour >= 18 || hour < 6) {
            document.body.classList.add('dark-mode');
            greetingText = "🌙 晚上好！该整理今天的收获了";
        } else {
            greetingText = hour < 12 ? "☀️ 早上好！" : "☕ 下午好！";
        }

        greetingElement.innerText = greetingText;
        
        async function init() {
            const hour = new Date().getHours();
            const greetingElement = document.getElementById('greeting');
            if (hour >= 18 || hour < 6) {
                document.body.classList.add('dark-mode');
                greetingElement.innerText = "🌙 晚上好！该整理今天的收获了";
            } else {
                greetingElement.innerText = hour < 12 ? "☀️ 早上好！" : "☕ 下午好！";
            }

            try {
                const response = await fetch('data.json');
                const mySites = await response.json();
                
                const container = document.getElementById('nav-links');
                
                mySites.forEach(site => {
                    const link = document.createElement('a');
                    link.href = site.url;
                    link.className = "nav-item";
                    link.target = "_blank";
                    link.innerHTML = `
                        <span class="icon">${site.icon || '🔗'}</span>
                        <span class="name">${site.name}</span>
                    `;
                    container.appendChild(link);
                });
            } catch (err) {
                console.error("加载数据失败:", err);
            }

            const searchInput = document.getElementById('search-input');

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = searchInput.value;
                    if (query) {
                        window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
